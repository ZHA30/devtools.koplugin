<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Devtools Files</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="app-shell">
    <header class="top-strip">
      <div class="top-left">
        <nav class="sheet-tabs" aria-label="Module tabs">
          <a id="tab-logs" class="sheet-tab" href="/logs">Logs</a>
          <a id="tab-files" class="sheet-tab active" href="/files">Files</a>
        </nav>
        <nav id="path-crumbs" class="path-crumbs" aria-label="Path breadcrumbs"></nav>
      </div>
      <div class="top-actions">
        <button id="btn-upload-files" class="action-btn" type="button">Upload files</button>
        <button id="btn-upload-folder" class="action-btn" type="button">Upload folder</button>
        <button id="btn-refresh" class="action-btn" type="button">Refresh</button>
        <button id="btn-restart" class="action-btn" type="button">Restart</button>
        <button id="theme-toggle" class="theme-toggle" type="button">Theme: Light</button>
      </div>
    </header>

    <section class="workspace-frame" aria-label="Remote file management">
      <div id="file-dropzone" class="sheet-table-wrap file-dropzone">
        <table class="sheet-table" id="remote-table">
          <thead>
            <tr>
              <th class="col-check"><input id="check-all" type="checkbox" aria-label="Select all"></th>
              <th id="th-name" class="sortable" role="button" tabindex="0">Name</th>
              <th id="th-modified" class="sortable" role="button" tabindex="0">Modified</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <input id="upload-input" class="visually-hidden" type="file" multiple>
  <input id="upload-folder-input" class="visually-hidden" type="file" multiple webkitdirectory directory>

  <section id="file-context-menu" class="context-menu hidden" role="menu" aria-label="File actions"></section>

  <section id="auth-modal" class="auth-modal hidden" role="dialog" aria-modal="true" aria-labelledby="auth-title">
    <div class="auth-card">
      <h2 id="auth-title">Authentication required</h2>
      <p id="auth-message">Enter authentication code to continue.</p>
      <input id="auth-code" type="password" placeholder="Authentication code" autocomplete="one-time-code">
      <p id="auth-error" class="auth-error"></p>
      <div class="auth-actions">
        <button id="btn-auth-cancel" type="button">Cancel</button>
        <button id="btn-auth-submit" class="primary" type="button">Unlock</button>
      </div>
    </div>
  </section>

  <script src="/files.js"></script>
</body>
</html>
