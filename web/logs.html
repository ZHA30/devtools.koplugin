<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Devtools Logs</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="app-shell">
    <header class="top-strip">
      <div class="top-left">
        <nav class="sheet-tabs" aria-label="Module tabs">
          <a id="tab-logs" class="sheet-tab active" href="/logs">Logs</a>
          <a id="tab-files" class="sheet-tab" href="/files">Files</a>
        </nav>
      </div>
      <div class="top-actions">
        <button id="btn-clear-log" class="action-btn" type="button">Clear</button>
        <button id="btn-prev-segment" class="action-btn" type="button">Prev</button>
        <button id="btn-next-segment" class="action-btn" type="button">Next</button>
        <button id="btn-restart" class="action-btn" type="button">Restart</button>
        <button id="theme-toggle" class="theme-toggle" type="button">Theme: Light</button>
      </div>
    </header>

    <section class="workspace-frame" aria-label="Real-time log diagnostics">
      <pre id="log-output" class="log-output" aria-live="polite"></pre>
    </section>
  </main>

  <section id="auth-modal" class="auth-modal hidden" role="dialog" aria-modal="true" aria-labelledby="auth-title">
    <div class="auth-card">
      <h2 id="auth-title">Authentication required</h2>
      <p id="auth-message">Enter authentication code to continue.</p>
      <input id="auth-code" type="password" placeholder="Authentication code" autocomplete="one-time-code">
      <p id="auth-error" class="auth-error"></p>
      <div class="auth-actions">
        <button id="btn-auth-cancel" type="button">Cancel</button>
        <button id="btn-auth-submit" class="primary" type="button">Unlock</button>
      </div>
    </div>
  </section>

  <script src="/logs.js"></script>
</body>
</html>
